<script>
    document.onkeydown = function(e) {
        if (e.key === "F12" || (e.ctrlKey && (e.key === "u" || e.key === "U" || e.key === "c" || e.key === "C" || e.key === "i" || e.key === "I" || e.key === "j" || e.key === "J"))) {
            alert("❌ ممنوع فتح أدوات المطور! ❌\nالموقع تحت حماية أبو ناقوس... لا تقلق، عيوننا عليك 👀");
            return false;
        }
    };
    alert("🔒 الموقع تحت حماية أبو ناقوس 🔒\nلا تقلق، أنت آمن... بس لا تسوي شيء غلط.");
</script>
